server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/rabbitmq_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: rabbitmq
    password: rabbitmq
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  rabbitmq:
    host: localhost
    port: 5672
    username: adminrbtmq
    password: rabbitmq

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
