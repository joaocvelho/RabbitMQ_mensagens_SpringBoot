server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/rabbitmq_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: rabbitmq
    password: rabbitmq
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: true
    open-in-view: false
    hibernate:
      ddl-auto: update

  rabbitmq:
    host: localhost
    port: 5672
    username: adminrbtmq
    password: rabbitmq

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
