<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>API RabbitMQ - Documentação Swagger</title>
  <link rel="stylesheet" type="text/css" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
  <style>
    html { box-sizing: border-box; overflow-y: scroll; }
    *, *:before, *:after { box-sizing: inherit; }
    body { margin: 0; background: #fafafa; }
  </style>
</head>
<body>
  <div id="swagger-ui"></div>

  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js" charset="UTF-8"></script>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js" charset="UTF-8"></script>
  <script>
    window.onload = function () {
      const spec = {
        "openapi": "3.1.0",
        "info": {
          "title": "API RabbitMQ - Envio de E-mails",
          "description": "API para envio de mensagens de e-mail utilizando fila RabbitMQ\n\n**Fluxo:**\n1. Cliente envia requisição POST com dados do e-mail\n2. Serviço persiste a mensagem no banco MySQL\n3. Produtor envia a mensagem para a fila RabbitMQ\n4. Consumidor escuta a fila e processa a mensagem",
          "version": "1.0.0"
        },
        "servers": [{ "url": "http://localhost:8081", "description": "Servidor local de desenvolvimento" }],
        "tags": [
          { "name": "Mensagens", "description": "Endpoints para envio e consulta de mensagens via RabbitMQ" }
        ],
        "paths": {
          "/envio-email": {
            "post": {
              "tags": ["Mensagens"],
              "summary": "Enviar e-mail para a fila",
              "description": "Recebe os dados do e-mail, persiste no banco e envia para a fila RabbitMQ",
              "operationId": "envioEmail",
              "requestBody": {
                "required": true,
                "content": {
                  "application/json": {
                    "schema": { "$ref": "#/components/schemas/RabbitMQDTO" }
                  }
                }
              },
              "responses": {
                "201": {
                  "description": "Mensagem enviada com sucesso",
                  "content": { "*/*": { "schema": { "$ref": "#/components/schemas/RabbitMQModel" } } }
                },
                "400": {
                  "description": "Dados inválidos fornecidos - erro de validação",
                  "content": { "*/*": { "schema": { "$ref": "#/components/schemas/ErroResposta" } } }
                },
                "503": {
                  "description": "RabbitMQ indisponível - falha de conexão ou envio",
                  "content": { "*/*": { "schema": { "$ref": "#/components/schemas/ErroResposta" } } }
                },
                "500": {
                  "description": "Erro interno do servidor",
                  "content": { "*/*": { "schema": { "$ref": "#/components/schemas/ErroResposta" } } }
                }
              }
            }
          },
          "/mensagens": {
            "get": {
              "tags": ["Mensagens"],
              "summary": "Listar todas as mensagens",
              "description": "Retorna todas as mensagens persistidas no banco MySQL",
              "operationId": "listarMensagens",
              "responses": {
                "200": {
                  "description": "Lista de mensagens retornada com sucesso",
                  "content": {
                    "*/*": {
                      "schema": {
                        "type": "array",
                        "items": { "$ref": "#/components/schemas/RabbitMQModel" }
                      }
                    }
                  }
                },
                "500": {
                  "description": "Erro interno do servidor",
                  "content": { "*/*": { "schema": { "$ref": "#/components/schemas/ErroResposta" } } }
                }
              }
            }
          }
        },
        "components": {
          "schemas": {
            "RabbitMQDTO": {
              "type": "object",
              "description": "DTO de entrada para envio de e-mail",
              "properties": {
                "id": { "type": "integer", "format": "int64", "description": "ID gerado automaticamente", "example": 1, "readOnly": true },
                "email": { "type": "string", "format": "email", "description": "E-mail do remetente", "example": "usuario@exemplo.com", "minLength": 1 },
                "nome": { "type": "string", "description": "Nome do remetente", "example": "João Silva", "minLength": 1 },
                "email_destinatario": { "type": "string", "format": "email", "description": "E-mail do destinatário", "example": "destinatario@exemplo.com", "minLength": 1 },
                "nome_destinatario": { "type": "string", "description": "Nome do destinatário", "example": "José Souza", "minLength": 1 },
                "mensagem": { "type": "string", "description": "Conteúdo da mensagem", "example": "Olá, este é um e-mail de teste.", "minLength": 1 },
                "observacao": { "type": "string", "description": "Observação opcional", "example": "Envio para todos" }
              },
              "required": ["email", "nome", "email_destinatario", "nome_destinatario", "mensagem"]
            },
            "RabbitMQModel": {
              "type": "object",
              "description": "Entidade que representa uma mensagem de e-mail persistida no banco",
              "properties": {
                "id": { "type": "integer", "format": "int64", "description": "ID único da mensagem", "example": 1 },
                "email": { "type": "string", "format": "email", "description": "E-mail do remetente", "example": "usuario@exemplo.com", "minLength": 1 },
                "nome": { "type": "string", "description": "Nome do remetente", "example": "João Silva", "minLength": 1 },
                "email_destinatario": { "type": "string", "format": "email", "description": "E-mail do destinatário", "example": "destinatario@exemplo.com", "minLength": 1 },
                "nome_destinatario": { "type": "string", "description": "Nome do destinatário", "example": "José Souza", "minLength": 1 },
                "mensagem": { "type": "string", "description": "Conteúdo da mensagem", "example": "Olá, este é um e-mail de teste.", "minLength": 1 },
                "observacao": { "type": "string", "description": "Observação opcional", "example": "Envio em lote" },
                "dataMensagem": { "type": "string", "format": "date-time", "description": "Data e hora do envio", "example": "2026-06-18T10:30:00" },
                "status": { "type": "string", "description": "Status da mensagem", "enum": ["ENVIADO", "ERRO_ENVIO"], "example": "ENVIADO" }
              },
              "required": ["email", "nome", "email_destinatario", "nome_destinatario", "mensagem"]
            },
            "ErroResposta": {
              "type": "object",
              "description": "Estrutura padrão de resposta de erro",
              "properties": {
                "timestamp": { "type": "string", "format": "date-time", "description": "Data e hora do erro", "example": "2026-06-18T12:00:00" },
                "status": { "type": "integer", "format": "int32", "description": "Código HTTP do erro", "example": 503 },
                "erro": { "type": "string", "description": "Descrição do erro", "example": "Service Unavailable" },
                "mensagem": { "type": "string", "description": "Mensagem detalhada do erro", "example": "Não foi possível enviar a mensagem para a fila RabbitMQ" },
                "caminho": { "type": "string", "description": "Caminho do endpoint", "example": "/envio-email" },
                "errosValidacao": {
                  "type": "array",
                  "description": "Erros de validação dos campos",
                  "items": { "$ref": "#/components/schemas/ErroValidacao" }
                }
              }
            },
            "ErroValidacao": {
              "type": "object",
              "description": "Erro de validação de campo específico",
              "properties": {
                "campo": { "type": "string", "description": "Nome do campo", "example": "email" },
                "mensagem": { "type": "string", "description": "Mensagem de erro do campo", "example": "E-mail não pode estar vazio" }
              }
            }
          }
        }
      };

      window.ui = SwaggerUIBundle({
        spec: spec,
        dom_id: '#swagger-ui',
        deepLinking: true,
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        plugins: [
          SwaggerUIBundle.plugins.DownloadUrl
        ],
        layout: "StandaloneLayout",
        operationsSorter: "method",
        tagsSorter: "alpha",
        tryItOutEnabled: true,
        validatorUrl: ""
      });
    };
  </script>
</body>
</html>
